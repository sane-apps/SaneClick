  - "zerodivisi0n/FinderMenu"
  - "RoadToDream/SzContext"
  - "wflixu/RClick"
  - "samiyuru/custom-finder-right-click-menu"
  
  # Popular/Related Tools (Watch for "alternative to X" queries)
