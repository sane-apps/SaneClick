# SaneClick Outreach Configuration
# Target: Users frustrated with complex, broken, or expensive Finder context menu tools

project:
  name: "SaneClick"
  url: "https://saneclick.com"
  github: "sane-apps/SaneClick"
  tagline: "Bring sanity to your right-click menu."

positioning:
  one_liner: "Private native Finder actions without Automator clutter."
  pricing: "Basic is free. Pro is $9.99 once."
  privacy_claim: "SaneClick keeps scripts, selected files, and automation contents on the Mac."

competitors:
