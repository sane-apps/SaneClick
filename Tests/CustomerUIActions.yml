---
version: 1
app: SaneClick
actions:
- id: main-category-enable-all
  title: Main category Enable All controls are live
  surfaces:
  - Main window category detail
  steps:
  - Click each category in the sidebar.
  - Toggle Enable All off and on for Essentials, Files & Folders, Images & Media,
    Coding, and Advanced.
  assertions:
  - Header enabled count changes immediately.
  - Row toggles match the header count.
  - Enabled count never exceeds available count.
  - Locked Pro categories open an upgrade gate for Basic users instead of pretending
    to activate Pro actions.
  evidence:
  - Mini AX click transcript
  - Screenshot of at least one all-on category state
  required_proof_level: runtime_visual
  required_evidence_types:
  - mini_click
  - screenshot
  historical_failure_classes:
  - persistence_or_relaunch_reset
  - layout_visual_regression
  - pro_basic_gate_drift
  - state_count_drift
  - activation_noop
  functional_state:
    description: Seeded Finder fixture with representative files, folders, images,
      code files, and enabled Basic/Pro action states.
    setup_steps:
    - Create the Finder test folder tree on the Mini.
    - Enable the direct build Finder extension and select representative fixture files
      before context-menu actions.
    fixture_paths:
    - Tests/Fixtures/customer-ui/finder-actions/
  user_inputs:
  - Click each category in the sidebar.
  - Toggle Enable All off and on for Essentials, Files & Folders, Images & Media,
    Coding, and Advanced.
  expected_outputs:
  - Header enabled count changes immediately.
  - Row toggles match the header count.
  - Enabled count never exceeds available count.
