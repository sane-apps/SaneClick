- id: custom-action-management
  title: Custom action management preserves customer actions
  surfaces:
  - Custom Actions manager
  - Script editor
  steps:
  - Open custom action management.
  - Create, edit, disable, re-enable, and delete a custom action.
  - Create or import a custom action whose title matches a built-in action.
  assertions:
  - Custom action edits persist after relaunch.
  - Built-in reconciliation does not overwrite same-title custom action content.
  - Deleted custom actions disappear from the menu.
  evidence:
  - Mini AX click transcript
  - Screenshot of custom action manager
  required_proof_level: full_runtime_completion
  required_evidence_types:
  - mini_click
  - screenshot
  - fixture
  historical_failure_classes:
  - duplicate_or_stale_menu_item
  - menu_entry_missing
  - data_loss_or_unexpected_mutation
  - persistence_or_relaunch_reset
  - activation_noop
  functional_state:
