- id: fresh-direct-install-finder-availability
  title: Fresh direct installs expose Finder actions without hidden monitored-folder
    setup
  surfaces:
  - Direct-download first launch
  - Finder right-click extension menu
  - Settings monitored folders
  steps:
  - Move any existing monitored_folders.json aside on the Mini instead of deleting
    it.
  - Launch the signed direct Release build.
  - Verify SaneClick computes default monitored folders for Desktop, Documents, Downloads,
    Pictures, and Movies when the storage file is missing.
  - Right-click a representative image under Downloads and verify SaneClick actions
    are available.
  - Open Settings and verify monitored-folder controls are visible in the direct build.
  assertions:
  - Missing monitored-folder storage cannot leave the direct app with an empty FinderSync
    directoryURLs set.
  - Direct users can see and change the folders where SaneClick appears.
  - Finder Recents is treated as a smart view; users are guided to monitor the backing
    folder.
  evidence:
  - Mini clean-state transcript
  - Unit guard for direct default monitored folders
  - Settings render with monitored-folder controls
  required_proof_level: full_runtime_completion
  required_evidence_types:
  - mini_click
  - screenshot
  - fixture
  - log
  historical_failure_classes:
  - context_menu_extension_missing
  - duplicate_or_stale_menu_item
  - menu_entry_missing
  - install_update_packaging
  - data_loss_or_unexpected_mutation
  - persistence_or_relaunch_reset
  - layout_visual_regression
  - state_count_drift
  - activation_noop
  functional_state:
    description: Seeded Finder fixture with representative files, folders, images,
      code files, and enabled Basic/Pro action states.
    setup_steps:
    - Create the Finder test folder tree on the Mini.
    - Enable the direct build Finder extension and select representative fixture files
      before context-menu actions.
    fixture_paths:
    - Tests/Fixtures/customer-ui/finder-actions/
  user_inputs:
  - Move any existing monitored_folders.json aside on the Mini instead of deleting
    it.
  - Launch the signed direct Release build.
  - Verify SaneClick computes default monitored folders for Desktop, Documents, Downloads,
    Pictures, and Movies when the storage file is missing.
  expected_outputs:
  - Missing monitored-folder storage cannot leave the direct app with an empty FinderSync
    directoryURLs set.
  - Direct users can see and change the folders where SaneClick appears.
  - Finder Recents is treated as a smart view; users are guided to monitor the backing
    folder.
